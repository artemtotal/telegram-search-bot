services:
  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: potsdambot-qdrant
    restart: unless-stopped
    volumes:
      - tgbot_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  tgbot:
    container_name: tgbot
    build: .
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5006:5006"
      - "9968:9968"
    volumes:
      - tgbot_tgbot_data:/app/config
      # Kept intact for rollback; production vector reads/writes use Qdrant.
      - tgbot_chroma_data:/app/chroma
      - tgbot_qdrant_state:/app/qdrant-state
      - C:\Media\Downloads\Docker\adbot-data:/adbot:ro
    environment:
      # Secrets are loaded from the local .env file (excluded by .gitignore).
      - BOT_TOKEN=${BOT_TOKEN:?Set BOT_TOKEN in .env}
      - LANG=uk_UA
      - USER_BOT=0
      - USER_BOT_API_ID=1234567
      - USER_BOT_API_HASH=xxxxxxxxx
      - BOT_MODE=polling
      - CACHE_TIME=300
      - OPENROUTER_API_KEY=
      # OmniRoute proxy on the host: browser-managed opus-first combo.
      - OPENROUTER_URL=http://host.docker.internal:20128/v1/chat/completions
      - AI_MODEL=opus-first
      - AI_TRIGGER_WORD=потсдамбот
      - LOCAL_EMBED_CACHE=/app/models
      - LOCAL_EMBED_THREADS=4
      - LOCAL_EMBED_OFFLINE=1
      - LOCAL_EMBED_COLLECTION=chunks_local_v1
      # Qdrant provides semantic retrieval; SQLite remains the source of truth
      # and deterministic keyword supplement for contacts and exact terms.
      - VECTOR_BACKEND=qdrant
      - QDRANT_UPDATER_ENABLED=1
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=chunks_minilm_v1
      - QDRANT_STATE_PATH=/app/qdrant-state/embed_state.json

      - EMBED_BOOTSTRAP_DAYS=730
      - SEARCH_RECENT_DAYS=730
      - ADMIN_ID=312029534
      - CHAT_USERNAME=UkrainischesBrandenburg
      # Target chat for anonymous posts (Потсдам супергруппа)
      - ANON_TARGET_CHAT_ID=-1001724565311
      # Read-only path to telegram-ad-forwarder-bot SQLite with its bound topics.
      - ANON_TOPIC_SOURCE_DB=/adbot/sqlite.db
      - ANON_COOLDOWN_DAYS=7
      - ANON_DELETE_MINUTES=60
      - ANON_MIN_LENGTH=15
      - ANON_MAX_LENGTH=1500
      - CHROMA_PATH=/app/chroma
      - VEC_MIN_SCORE=0.35
      - ANONYMIZED_TELEMETRY=False
volumes:
  tgbot_tgbot_data:
    external: true
  tgbot_chroma_data: {}
  tgbot_qdrant_data: {}
  tgbot_qdrant_state: {}
