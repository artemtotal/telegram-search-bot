version: "3.9"
services:
  tgbot:
    container_name: tgbot
    image: tgbot:ai
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5006:5006"
      - "9968:9968"
    volumes:
      - tgbot_tgbot_data:/app/config
      - tgbot_chroma_data:/app/chroma
    environment:
      - BOT_TOKEN=xxxx:xxxx                   # замените на токен от @BotFather
      - LANG=uk_UA
      - USER_BOT=0
      - USER_BOT_API_ID=1234567
      - USER_BOT_API_HASH=xxxxxxxxx
      - BOT_MODE=polling
      - CACHE_TIME=300
      - OPENROUTER_API_KEY=                # ключ для Hermes-прокси
      # Hermes-прокси на хосте: Claude Sonnet -> GPT fallback.
      # Если убрать эту строку — дефолт https://openrouter.ai напрямую.
      - OPENROUTER_URL=http://host.docker.internal:20128/v1/chat/completions
      - AI_MODEL=auto/best-fast
      - GEMINI_API_KEY=                        # замените на ваш Gemini API ключ
      - AI_TRIGGER_WORD=потсдамбот
      - ADMIN_ID=                            # ваш Telegram ID
      - CHAT_USERNAME=UkrainischesBrandenburg
      - CHROMA_PATH=/app/chroma
      - VEC_MIN_SCORE=0.35                  # порог релевантности векторного поиска
      - ANONYMIZED_TELEMETRY=False
volumes:
  tgbot_tgbot_data:
    external: true
  tgbot_chroma_data: {}